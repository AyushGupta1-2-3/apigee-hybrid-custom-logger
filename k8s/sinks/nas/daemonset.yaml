apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentd-daemonset
  namespace: platform-ops
spec:
  selector:
    matchLabels:
      app: fluentd-daemonset
  template:
    metadata:
      labels:
        app: fluentd-daemonset
    spec:
      serviceAccountName: fluentd-daemonset
      containers:
      - name: fluentd
        image: fluent/fluentd-kubernetes-daemonset:v1.17.0-debian-forward-1.0
        env:
          - name: K8S_NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          - name: FLUENTD_PROMETHEUS_CONF
            value: "disable"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m 
            memory: 512Mi
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: config
          mountPath: /fluentd/etc/fluent.conf
          subPath: fluent.conf
        - name: varlog
          mountPath: /var/log
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: nas-storage
          mountPath: /mnt/nas-logs
          readOnly: false
      terminationGracePeriodSeconds: 30
      volumes:
      - name: nas-storage
        # CHANGE THIS: Configure your NFS or other storage backend here.
        nfs:
          server: 10.172.239.194
          path: /vol1
      - name: config
        configMap:
          name: fluentd-config-map
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: varrunkubernetes
        projected:
          sources:
          - serviceAccountToken:
              path: token
              expirationSeconds: 3600
          - configMap:
              name: kube-root-ca.crt
              items:
              - key: ca.crt
                path: ca.crt
          - downwardAPI:
              items:
                - path: "namespace"
                  fieldRef:
                    fieldPath: metadata.namespace
